    <div id="modal-properti" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">

    <div id="modal-contact" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">

            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="ph-fill ph-phone-call text-4xl"></i>
                </div>
                <h3 class="text-xl font-black text-slate-800 tracking-tight uppercase">Hubungi Admin</h3>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1 mb-4">Daftar Pengelola Aktif</p>
                <div id="admin-list-container" class="space-y-3"></div>
            </div>

        </div>

    <script>
        // 1. INISIALISASI STATE GLOBAL (DIBUTUHKAN OLEH views.js)
        window.State = {
            user: {
                token: localStorage.getItem('token'),
                role: localStorage.getItem('role') || 'admin',
                nama: localStorage.getItem('nama'),
                email: localStorage.getItem('email'),
                telepon: localStorage.getItem('telepon'),
                telepon_pengelola: localStorage.getItem('telepon_pengelola'),
                alamat_domisili: localStorage.getItem('alamat_domisili'),
                status_verifikasi: localStorage.getItem('status_verifikasi')
            },
            clearAuth: () => {
                localStorage.clear();
                window.location.href = 'index.html';
            },
            syncProfile: () => {
                localStorage.setItem('nama', State.user.nama || '');
                localStorage.setItem('telepon', State.user.telepon || State.user.telepon_pengelola || '');
                localStorage.setItem('alamat_domisili', State.user.alamat_domisili || '');
                window.location.reload(); 
            }
        };

        const TOKEN = State.user.token;
        const ROLE = State.user.role;
        
        if (!TOKEN) window.location.href = 'index.html';

        // 2. RENDER HEADER & SIDEBAR DINAMIS
        let rawName = State.user.nama;
        if (!rawName && State.user.email) {
            rawName = State.user.email.split('@')[0];
        }
        const userName = rawName || ROLE;
        const initial = userName.charAt(0).toUpperCase();

        document.getElementById('header-name').innerText = userName;
        document.getElementById('header-role').innerText = ROLE;
        document.getElementById('header-initial').innerText = initial;
        
        document.getElementById('modal-prof-name').innerText = userName;
        document.getElementById('modal-prof-role').innerText = ROLE + " Account";
        document.getElementById('modal-prof-initial').innerText = initial;

        const menuContainer = document.getElementById('sidebar-menu');
        const pageTitle = document.getElementById('page-title');

        if (ROLE === 'manager' || ROLE === 'admin') {
            menuContainer.innerHTML = `
                <a href="index.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800">
                    <i class="ph-bold ph-squares-four text-xl"></i><span>Dashboard</span>
                </a>
                <a href="properti.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 bg-blue-50 text-blue-600 shadow-sm border border-blue-100">
                    <i class="ph-bold ph-house-line text-xl"></i><span>Manajemen Unit</span>
                </a>
                <a href="tenant.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800">
                    <i class="ph-bold ph-users-three text-xl"></i><span>Data Penyewa</span>
                </a>
                <a href="kontrak.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800">
                    <i class="ph-bold ph-file-text text-xl"></i><span>Kontrak Sewa</span>
                </a>
                <a href="pembayaran.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800">
                    <i class="ph-bold ph-credit-card text-xl"></i><span>Keuangan</span>
                </a>
            `;
            pageTitle.innerHTML = `Manajemen <span class="text-blue-600">Unit</span> `;
            
            document.getElementById('btn-tambah').classList.replace('hidden', 'flex');

        } else if (ROLE === 'tenant') {
            menuContainer.innerHTML = `
                <a href="index.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800">
                    <i class="ph-bold ph-squares-four text-xl"></i><span>Dashboard</span>
                </a>
                <a href="properti.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 bg-blue-50 text-blue-600 shadow-sm border border-blue-100">
                    <i class="ph-bold ph-storefront text-xl"></i><span>Katalog Property</span>
                </a>
                <a href="kontrak.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800">
                    <i class="ph-bold ph-file-text text-xl"></i><span>Kontrak Saya</span>
                </a>
                <a href="pembayaran.html" class="flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800">
                    <i class="ph-bold ph-receipt text-xl"></i><span>Tagihan & Bayar</span>
                </a>
            `;
            pageTitle.innerHTML = `Katalog <span class="text-blue-600">Properti</span> `;
            
            document.getElementById('field-id-auto').classList.add('hidden');
        }

        // ==========================================
        // SCRIPT AUTO-GENERATE KODE PROPERTI 
        // ==========================================
        
        function generateKodeProperti(tipe) {
            const prefixMap = {
                'Rumah': 'RMH',
                'Apartemen': 'APT',
                'Ruko': 'R',
                'Kantor': 'OFC',
                'Gudang': 'GDG'
            };
            const prefix = prefixMap[tipe] || 'PROP';
            
            const randomSuffix = Math.floor(1000 + Math.random() * 9000);
            return `${prefix}-${randomSuffix}`;
        }

        document.getElementById('prop-tipe').addEventListener('change', function() {
            const idValue = document.getElementById('prop-id').value;
            if (!idValue) {
                const generatedKode = generateKodeProperti(this.value);
                document.getElementById('prop-kode').value = generatedKode;
            }
        });


        // ==========================================
        // SCRIPT CRUD & API PROPERTI 
        // ==========================================
        const API_URL = 'http://127.0.0.1:3000/api/properti';
        const BASE_IMG_URL = 'http://127.0.0.1:3000/uploads/';
        const ADMIN_CONTACT_URL = 'http://127.0.0.1:3000/api/admin-contact';
        
        let masterData = []; 
        let activeCategory = 'all';
        let searchQuery = '';

        async function loadData() {
            try {
                const res = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
                const result = await res.json();
                if (result.success) { masterData = result.data; filterAndRender(); }
            } catch (e) { console.error(e); }
        }

        // [FIX UI/UX]: Menambahkan manipulasi class Tailwind untuk state filter aktif
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Hapus state aktif dari semua tombol
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600', 'shadow-md', 'shadow-blue-200');
                    b.classList.add('bg-white', 'text-slate-600', 'border-slate-200', 'hover:border-blue-600', 'hover:text-blue-600');
                });
                
                // Tambahkan state aktif ke tombol yang diklik
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200', 'hover:border-blue-600', 'hover:text-blue-600');
                btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600', 'shadow-md', 'shadow-blue-200');
                
                activeCategory = btn.dataset.category; 
                filterAndRender();
            });
        });

        function filterAndRender() {
            const filtered = masterData.filter(p => {
                const matchesSearch = p.nama_properti.toLowerCase().includes(searchQuery) || 
                                     p.alamat.toLowerCase().includes(searchQuery) ||
                                     p.kode_properti.toLowerCase().includes(searchQuery);
                const matchesCategory = activeCategory === 'all' || p.tipe_properti.toLowerCase() === activeCategory.toLowerCase();
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('view-grid').innerHTML = "";
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                renderGrid(filtered); // Grid View Digunakan Secara Universal
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase(); filterAndRender();
        });


        // Fungsi Grid View Universal untuk semua level Role
        function renderGrid(data) {
            const container = document.getElementById('view-grid');
            container.innerHTML = data.map(p => {
                const imgPath = p.gambar_properti && p.gambar_properti !== 'default.jpg' 
                                ? `${BASE_IMG_URL}${p.gambar_properti}` 
                                : 'https://placehold.co/600x400?text=No+Image';
                                
                // Parsing object secara aman menghindari bug single quotes
                const safeData = encodeURIComponent(JSON.stringify(p));

                return `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 flex flex-col gap-4 text-center group transition-all hover:shadow-md animate-fade-in">
                        <div class="flex flex-col items-center">
                            <img src="${imgPath}" class="w-full h-56 rounded-2xl object-cover mb-4 shadow-inner">
                            <div class="w-full">
                                <h4 class="text-xl font-bold text-slate-800 uppercase tracking-tight">${p.nama_properti}</h4>
                                <h5 class="text-2xl font-black text-blue-600 mt-1.5">Rp ${Number(p.hargasewa_standar).toLocaleString('id-ID')}</h5>
                                <div class="flex gap-2 justify-center my-4">
                                    <span class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase bg-emerald-50 text-emerald-600">${p.status_properti}</span>
                                    <span class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase bg-blue-50 text-blue-600">${p.tipe_properti}</span>
                                </div>
                                <p class="text-xs text-slate-400 mb-4 line-clamp-2 h-8 leading-relaxed">${p.alamat}</p>
                                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">KODE: ${p.kode_properti}</p>
                            </div>
                        </div>
                        ${ROLE === 'tenant' ? `
                        <div class="flex gap-2 mt-2">
                            <button onclick="ajukanSewa(${p.id_properti})" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-3.5 rounded-xl font-bold text-sm transition active:scale-95 shadow-lg shadow-emerald-200 flex items-center justify-center gap-2 uppercase tracking-widest">
                                <i class="ph-bold ph-handshake text-lg"></i> Ajukan Sewa
                            </button>
                            <button onclick="showContactModal()" class="w-[52px] flex-shrink-0 flex items-center justify-center gap-2 border-2 border-slate-200 text-slate-500 py-3.5 rounded-xl font-bold text-sm hover:border-emerald-500 hover:text-emerald-500 transition active:scale-95 bg-white" title="Hubungi Admin">
                                <i class="ph-bold ph-phone-call text-xl"></i>
                            </button>
                        </div>` : `
                        <div class="flex gap-2 mt-2">
                             <button onclick="editData(JSON.parse(decodeURIComponent('${safeData}')))" class="flex-1 border-2 border-blue-600 text-blue-600 py-3 rounded-xl font-bold text-xs hover:bg-blue-50 transition uppercase tracking-widest flex justify-center items-center gap-1 active:scale-95">
                                <i class="ph-bold ph-pencil-simple text-sm"></i> Edit
                             </button>
                             <button onclick="hapusData(${p.id_properti})" class="flex-1 border-2 border-red-500 text-red-500 py-3 rounded-xl font-bold text-xs hover:bg-red-50 transition uppercase tracking-widest flex justify-center items-center gap-1 active:scale-95">
                                <i class="ph-bold ph-trash text-sm"></i> Hapus
                             </button>
                        </div>`}
                    </div>`;
            }).join('');
        }

        async function showContactModal() {
            const modal = document.getElementById('modal-contact');
            const container = document.getElementById('admin-list-container');
            
            modal.classList.remove('hidden');
            container.innerHTML = `<p class="text-slate-400 animate-pulse text-[11px] font-bold">Mengambil data admin...</p>`;

            try {
                const res = await fetch(ADMIN_CONTACT_URL, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
                const result = await res.json();
                if (result.success && result.admins.length > 0) {
                    container.innerHTML = result.admins.map(admin => `
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col gap-1 items-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">WhatsApp/Telp</p>
                            <a href="https://wa.me/${admin.telepon_pengelola}" target="_blank" class="text-blue-600 font-black text-lg hover:underline transition">${admin.telepon_pengelola}</a>
                            <p class="text-[10px] text-slate-400 font-medium">${admin.email}</p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<p class="text-slate-500 text-xs font-bold py-4">Belum ada kontak admin tersedia.</p>`;
                }
            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-xs font-bold py-4">Gagal memuat kontak admin.</p>`;
            }
        }
        function closeContactModal() { document.getElementById('modal-contact').classList.add('hidden'); }

        document.getElementById('formProperti').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('prop-id').value;
            const fileInput = document.getElementById('prop-gambar');
            
            const formData = new FormData();
            formData.append('kode_properti', document.getElementById('prop-kode').value);
            formData.append('nama_properti', document.getElementById('prop-nama').value);
            formData.append('tipe_properti', document.getElementById('prop-tipe').value);
            formData.append('hargasewa_standar', document.getElementById('prop-harga').value);
            formData.append('alamat', document.getElementById('prop-alamat').value);
            formData.append('status_properti', document.getElementById('prop-status').value);
            
            if (fileInput.files[0]) formData.append('gambar_properti', fileInput.files[0]);

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const res = await fetch(url, { method, headers: { 'Authorization': `Bearer ${TOKEN}` }, body: formData });
                const resData = await res.json();
                if (resData.success) { closeModal(); loadData(); }
                else { alert(resData.message); }
            } catch (err) { alert("Terjadi kesalahan jaringan."); }
        };

        async function hapusData(id) {
            if (confirm("Hapus aset properti ini secara permanen?")) {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${TOKEN}` } });
                if ((await res.json()).success) loadData();
            }
        }

        function openModal() {
            document.getElementById('modal-properti').classList.remove('hidden');
            document.getElementById('formProperti').reset();
            document.getElementById('img-preview').classList.add('hidden');
            document.getElementById('preview-placeholder').classList.remove('hidden');
            document.getElementById('prop-id').value = "";
            document.getElementById('modal-title').innerText = "Entry Properti Baru";
            
            document.getElementById('prop-id-display').value = "AUTO-INCREMENT";
            
            const defaultTipe = document.getElementById('prop-tipe').value;
            document.getElementById('prop-kode').value = generateKodeProperti(defaultTipe);
        }

        function editData(p) {
            document.getElementById('modal-properti').classList.remove('hidden');
            
            document.getElementById('modal-title').innerText = "Update Properti";
            document.getElementById('prop-id').value = p.id_properti;
            document.getElementById('prop-id-display').value = p.id_properti;
            document.getElementById('prop-kode').value = p.kode_properti;
            document.getElementById('prop-nama').value = p.nama_properti;
            document.getElementById('prop-tipe').value = p.tipe_properti;
            document.getElementById('prop-harga').value = p.hargasewa_standar;
            document.getElementById('prop-alamat').value = p.alamat;
            document.getElementById('prop-status').value = p.status_properti;
            
            if (p.gambar_properti && p.gambar_properti !== 'default.jpg') {
                const preview = document.getElementById('img-preview');
                preview.src = `${BASE_IMG_URL}${p.gambar_properti}`;
                preview.classList.remove('hidden');
                document.getElementById('preview-placeholder').classList.add('hidden');
            }
        }

        function closeModal() { document.getElementById('modal-properti').classList.add('hidden'); }

        document.getElementById('prop-gambar').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('img-preview');
            const placeholder = document.getElementById('preview-placeholder');
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        loadData();
    </script>
</body>
</html>
